version: '3.8'

services:
  discord-bot:
    build: .
    container_name: discord-rp-bot
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      CLIENT_ID: ${CLIENT_ID}
      COMMAND_GUILD_ID: ${COMMAND_GUILD_ID:-}
      GUILD_ID: ${GUILD_ID:-}
      CURRENCY_EMOJI: ${CURRENCY_EMOJI:-🍬}
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-0}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
